<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 800 170" width="100%" height="auto" style="background: var(--bg-cream); border: 1px solid var(--rule); padding: 1.25rem; box-sizing: border-box;" class="editorial-diagram">
    <defs>
        <marker id="arrow" viewBox="0 0 10 10" refX="6" refY="5" markerWidth="6" markerHeight="6" orient="auto-start-reverse">
            <path d="M 0 2 L 8 5 L 0 8 z" fill="var(--accent)" />
        </marker>
    </defs>
    
    <!-- Block 1: Climate Data -->
    <rect x="10" y="45" width="130" height="70" rx="3" fill="var(--bg-white)" stroke="var(--accent)" stroke-width="1.5" />
    <text x="75" y="75" text-anchor="middle" font-family="var(--font-body)" font-size="11" font-weight="bold" fill="var(--text-primary)">CLIMATE DATA</text>
    <text x="75" y="95" text-anchor="middle" font-family="var(--font-body)" font-size="9" fill="var(--text-muted)">Historical Inputs</text>

    <!-- Connection 1 -->
    <line x1="140" y1="80" x2="170" y2="80" stroke="var(--accent)" stroke-width="1.5" marker-end="url(#arrow)" />

    <!-- Block 2: HMM -->
    <rect x="170" y="45" width="130" height="70" rx="3" fill="var(--bg-white)" stroke="var(--accent)" stroke-width="1.5" />
    <text x="235" y="75" text-anchor="middle" font-family="var(--font-body)" font-size="11" font-weight="bold" fill="var(--text-primary)">MARKOV REGIMES</text>
    <text x="235" y="95" text-anchor="middle" font-family="var(--font-body)" font-size="9" fill="var(--text-muted)">Latent HMM States</text>

    <!-- Connection 2 -->
    <line x1="300" y1="80" x2="330" y2="80" stroke="var(--accent)" stroke-width="1.5" marker-end="url(#arrow)" />

    <!-- Block 3: RS-GBM -->
    <rect x="330" y="45" width="130" height="70" rx="3" fill="var(--bg-white)" stroke="var(--accent)" stroke-width="1.5" />
    <text x="395" y="70" text-anchor="middle" font-family="var(--font-body)" font-size="11" font-weight="bold" fill="var(--text-primary)">RS-GBM MODEL</text>
    <text x="395" y="86" text-anchor="middle" font-family="var(--font-mono)" font-size="8.5" fill="var(--accent-mid)">dS_t = μ_i S_t dt + σ_i S_t dW_t</text>
    <text x="395" y="100" text-anchor="middle" font-family="var(--font-body)" font-size="8" fill="var(--text-muted)">Stochastic Dynamics</text>

    <!-- Connection 3 -->
    <line x1="460" y1="80" x2="490" y2="80" stroke="var(--accent)" stroke-width="1.5" marker-end="url(#arrow)" />

    <!-- Block 4: Monte Carlo -->
    <rect x="490" y="45" width="130" height="70" rx="3" fill="var(--bg-white)" stroke="var(--accent)" stroke-width="1.5" />
    <text x="555" y="75" text-anchor="middle" font-family="var(--font-body)" font-size="11" font-weight="bold" fill="var(--text-primary)">MONTE CARLO</text>
    <text x="555" y="95" text-anchor="middle" font-family="var(--font-body)" font-size="9" fill="var(--text-muted)">Path Simulation</text>

    <!-- Connection 4 -->
    <line x1="620" y1="80" x2="650" y2="80" stroke="var(--accent)" stroke-width="1.5" marker-end="url(#arrow)" />

    <!-- Block 5: Decision Support -->
    <rect x="650" y="45" width="140" height="70" rx="3" fill="var(--bg-white)" stroke="var(--accent)" stroke-width="1.5" />
    <text x="720" y="75" text-anchor="middle" font-family="var(--font-body)" font-size="11" font-weight="bold" fill="var(--text-primary)">DECISION METRICS</text>
    <text x="720" y="95" text-anchor="middle" font-family="var(--font-body)" font-size="9" fill="var(--text-muted)">VaR &amp; Expected Shortfall</text>
</svg>
