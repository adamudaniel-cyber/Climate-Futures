<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 400 240" width="100%" height="auto" style="background: var(--bg-cream); border: 1px solid var(--rule); padding: 0.75rem; box-sizing: border-box;" class="editorial-diagram">
    <defs>
        <marker id="arrow-sm-5" viewBox="0 0 10 10" refX="6" refY="5" markerWidth="5" markerHeight="5" orient="auto-start-reverse">
            <path d="M 0 2 L 8 5 L 0 8 z" fill="var(--accent)" />
        </marker>
    </defs>
    <!-- Central Decision Engine -->
    <circle cx="200" cy="120" r="45" fill="var(--bg-white)" stroke="var(--accent)" stroke-width="1.5" />
    <text x="200" y="112" text-anchor="middle" font-family="var(--font-body)" font-size="9" font-weight="bold" fill="var(--text-primary)">STOCHASTIC</text>
    <text x="200" y="123" text-anchor="middle" font-family="var(--font-body)" font-size="9" font-weight="bold" fill="var(--text-primary)">DECISION</text>
    <text x="200" y="133" text-anchor="middle" font-family="var(--font-body)" font-size="8" fill="var(--accent-mid)">ENGINE</text>

    <!-- Top Left: SDG 13 -->
    <rect x="15" y="15" width="130" height="50" rx="2" fill="var(--bg-white)" stroke="#3F7E5A" stroke-width="1" />
    <text x="80" y="28" text-anchor="middle" font-family="var(--font-body)" font-size="9" font-weight="bold" fill="#3F7E5A">SDG 13: Climate Action</text>
    <text x="80" y="40" text-anchor="middle" font-family="var(--font-body)" font-size="7.5" fill="var(--text-muted)">Stochastic Risk Plumes</text>
    <text x="80" y="50" text-anchor="middle" font-family="var(--font-body)" font-size="7" fill="var(--text-muted)">Probabilistic Planning</text>
    <line x1="130" y1="65" x2="165" y2="85" stroke="var(--accent)" stroke-width="1" marker-end="url(#arrow-sm-5)" />

    <!-- Top Right: SDG 2 -->
    <rect x="255" y="15" width="130" height="50" rx="2" fill="var(--bg-white)" stroke="#A21C26" stroke-width="1" />
    <text x="320" y="28" text-anchor="middle" font-family="var(--font-body)" font-size="9" font-weight="bold" fill="#A21C26">SDG 2: Zero Hunger</text>
    <text x="320" y="40" text-anchor="middle" font-family="var(--font-body)" font-size="7.5" fill="var(--text-muted)">Rainfall Volatility Models</text>
    <text x="320" y="50" text-anchor="middle" font-family="var(--font-body)" font-size="7" fill="var(--text-muted)">Agricultural Resilience</text>
    <line x1="270" y1="65" x2="235" y2="85" stroke="var(--accent)" stroke-width="1" marker-end="url(#arrow-sm-5)" />

    <!-- Bottom Left: SDG 11 -->
    <rect x="15" y="175" width="130" height="50" rx="2" fill="var(--bg-white)" stroke="#D88B27" stroke-width="1" />
    <text x="80" y="188" text-anchor="middle" font-family="var(--font-body)" font-size="9" font-weight="bold" fill="#D88B27">SDG 11: Resilient Cities</text>
    <text x="80" y="200" text-anchor="middle" font-family="var(--font-body)" font-size="7.5" fill="var(--text-muted)">Extreme Flood Forecasting</text>
    <text x="80" y="210" text-anchor="middle" font-family="var(--font-body)" font-size="7" fill="var(--text-muted)">Infrastructure Safety</text>
    <line x1="130" y1="175" x2="165" y2="155" stroke="var(--accent)" stroke-width="1" marker-end="url(#arrow-sm-5)" />

    <!-- Bottom Right: SDG 7 -->
    <rect x="255" y="175" width="130" height="50" rx="2" fill="var(--bg-white)" stroke="#F3C300" stroke-width="1" />
    <text x="320" y="188" text-anchor="middle" font-family="var(--font-body)" font-size="9" font-weight="bold" fill="#F3C300">SDG 7: Clean Energy</text>
    <text x="320" y="200" text-anchor="middle" font-family="var(--font-body)" font-size="7.5" fill="var(--text-muted)">Stochastic Hydro/Solar Risk</text>
    <text x="320" y="210" text-anchor="middle" font-family="var(--font-body)" font-size="7" fill="var(--text-muted)">Grid Volatility Management</text>
    <line x1="270" y1="175" x2="235" y2="155" stroke="var(--accent)" stroke-width="1" marker-end="url(#arrow-sm-5)" />
</svg>
